name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write
  id-token: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov flake8 black mypy bandit

      - name: Lint
        run: |
          flake8 kubenumerate.py ExtensiveRoleCheck.py formatter.py \
            --max-line-length=120 --ignore=E501,W503
          black --check --diff kubenumerate.py ExtensiveRoleCheck.py formatter.py

      - name: Type check
        run: mypy kubenumerate.py --ignore-missing-imports

      - name: Security scan
        run: bandit -r . -f json -o bandit-report.json || true

      - name: Run tests
        run: python -m pytest tests/ -v --cov=kubenumerate --cov-report=xml

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: |
            coverage.xml
            bandit-report.json

  bump-version:
    name: Bump Version
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    outputs:
      new_version: ${{ steps.bump.outputs.new_version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump patch version
        id: bump
        run: |
          VERSION=$(cat VERSION)
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          NEW_VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))"
          echo "$NEW_VERSION" > VERSION
          sed -i '/^\[project\]/,/^\[/{s/^version = ".*"/version = "'"$NEW_VERSION"'"/}' pyproject.toml
          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"

      - name: Commit and tag
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add VERSION pyproject.toml
          git commit -m "Bump version to ${{ steps.bump.outputs.new_version }} [skip ci]"
          git tag -a "v${{ steps.bump.outputs.new_version }}" \
            -m "Release ${{ steps.bump.outputs.new_version }}"
          git push origin HEAD:main
          git push origin "v${{ steps.bump.outputs.new_version }}"

  docker:
    name: Docker
    runs-on: ubuntu-latest
    needs: bump-version
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: v${{ needs.bump-version.outputs.new_version }}

      - name: Get version
        id: version
        run: echo "version=$(cat VERSION)" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/kubenumerate:${{ steps.version.outputs.version }}
            ${{ secrets.DOCKER_USERNAME }}/kubenumerate:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  pypi:
    name: PyPI
    runs-on: ubuntu-latest
    needs: bump-version
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: v${{ needs.bump-version.outputs.new_version }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build package
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
          skip-existing: true

  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [bump-version, docker, pypi]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: v${{ needs.bump-version.outputs.new_version }}

      - name: Get version and changelog
        id: release_info
        run: |
          NEW_VERSION=$(cat VERSION)
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            CHANGELOG=$(git log --oneline --no-merges "${PREV_TAG}..v${NEW_VERSION}")
          else
            CHANGELOG=$(git log --oneline --no-merges)
          fi
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          {
            echo "changelog<<EOF"
            echo "$CHANGELOG"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.release_info.outputs.version }}
          name: Release ${{ steps.release_info.outputs.version }}
          body: |
            ## Changes

            ${{ steps.release_info.outputs.changelog }}
          files: kubenumerate.py
